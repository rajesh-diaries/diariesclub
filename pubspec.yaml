name: diaries_club
description: "Diaries Club — Premium kids play area app"
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.0.0

  # Payments — wired in Session 12; placeholder keys until then
  razorpay_flutter: ^1.3.6

  # Animations
  rive: ^0.13.0
  lottie: ^3.1.0

  # Fonts and icons
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.20.2  # bumped from spec's 0.19 — required by flutter_localizations
  uuid: ^4.4.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  url_launcher: ^6.2.5
  share_plus: ^10.1.0  # bumped from spec's 9.0 — needed for compat with firebase_messaging_web ^3.10
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.0
  wakelock_plus: ^1.2.5
  pub_semver: ^2.1.4

  # Photo handling
  image_picker: ^1.1.0
  image: ^4.1.7

  # Notifications — config files added in Session 12
  firebase_core: ^3.1.1
  firebase_messaging: ^15.1.1
  flutter_local_notifications: ^17.1.2

  # Crash reporting — bumped from spec's 8.5 to 9.x for Kotlin 1.8+ compat
  sentry_flutter: ^9.0.0

  # Deep links — IMPORTANT: NOT firebase_dynamic_links
  flutter_branch_sdk: ^8.0.0

  # Misc
  collection: ^1.18.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/rive/
    - assets/lottie/
    - assets/images/
    - assets/hero/
