<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="diaries_club">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>diaries_club</title>
  <link rel="manifest" href="manifest.json">

  <!--
    BUG-037 / BUG-039 fix: force CanvasKit via the MODERN initializer API.
    The previous attempt (window.flutterConfiguration = { renderer:
    'canvaskit' }) was the deprecated form and crashed the app boot with
    "Use engineInitializer.initializeEngine(config) only. Using the
    (deprecated) window.flutterConfiguration and initializeEngine
    configuration simultaneously is not supported." Modern Flutter web
    bootstrap handles config exclusively through _flutter.loader.load({
    config: { ... } }).
  -->
</head>
<body>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      config: {
        renderer: 'canvaskit',
      },
    });
  </script>
</body>
</html>
